
<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp P2P - Karanlık Mod</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          animation: {
            'spin-slow': 'spin 3s linear infinite',
            'shake': 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both',
            'flash': 'flash 0.5s ease-in-out infinite',
            'bounce-up': 'bounce-up 2s ease-out forwards',
          },
          keyframes: {
            shake: {
              '10%, 90%': { transform: 'translate3d(-2px, 0, 0)' },
              '20%, 80%': { transform: 'translate3d(4px, 0, 0)' },
              '30%, 50%, 70%': { transform: 'translate3d(-12px, 0, 0)' },
              '40%, 60%': { transform: 'translate3d(12px, 0, 0)' },
            },
            flash: {
              '0%, 100%': { opacity: 1, transform: 'scale(1)' },
              '50%': { opacity: 0.5, transform: 'scale(1.2) rotate(5deg)' },
            },
            'bounce-up': {
              '0%': { transform: 'translateY(0) scale(0)', opacity: 1 },
              '100%': { transform: 'translateY(-100vh) scale(1.5)', opacity: 0 },
            }
          },
          colors: {
            whatsapp: {
              dark: '#0b141a',
              sidebar: '#111b21',
              header: '#202c33',
              input: '#2a3942',
              me: '#005c4b',
              them: '#202c33',
              text: '#e9edef',
              secondary: '#8696a0'
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #0b141a;
      color: #e9edef;
      overflow: hidden;
    }
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-thumb {
      background: #374151;
      border-radius: 10px;
    }
    .whatsapp-bg {
      background-color: #0b141a;
      background-image: url("https://www.transparenttextures.com/patterns/cubes.png");
      background-blend-mode: overlay;
      opacity: 0.4;
    }
    .chat-container {
      background-color: #0b141a;
    }
    .nudge-active {
      animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
      animation-iteration-count: 6; /* Daha uzun süreli titreme */
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom": "https://esm.sh/react-dom@^19.2.3",
    "react-dom/client": "https://esm.sh/react-dom@^19.2.3/client",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "peerjs": "https://esm.sh/peerjs@1.5.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0"
  }
}
</script>
</head>
<body class="dark bg-whatsapp-dark text-whatsapp-text overflow-hidden">
  <div id="root" class="h-full w-full"></div>
</body>
</html>
